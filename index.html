<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>大会ブース 投票システム</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --primary-color: #0056b3;
  --secondary-color: #e9ecef;
  --success-color: #28a745;
  --error-color: #dc3545;
  --text-main: #333333;
  --bg-color: #f4f7f6;
}
body {
  font-family: 'Noto Sans JP', sans-serif;
  background-color: var(--bg-color);
  color: var(--text-main);
  margin: 0;
  padding: 0;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
}
.container {
  background-color: #ffffff;
  padding: 2rem;
  border-radius: 12px;
  box-shadow: 0 8px 24px rgba(0, 0, 0, 0.1);
  width: 90%;
  max-width: 400px;
  text-align: center;
}
h1 { font-size: 1.5rem; margin-bottom: 0.5rem; color: var(--primary-color); }
#category-display { font-weight: 700; color: #555; margin-bottom: 10px; font-size: 1.1rem; }
.booth-name {
  font-size: 1.25rem; font-weight: 700; margin: 1rem 0; padding: 1rem;
  background-color: var(--secondary-color); border-radius: 8px; display: none;
}
.status-message { margin-bottom: 1.5rem; font-size: 0.95rem; color: #666; min-height: 1.5em; }
.error-message { color: var(--error-color); font-weight: 500; }
.success-message { color: var(--success-color); font-weight: 700; font-size: 1.1rem; }
.vote-btn {
  background-color: var(--primary-color); color: white; border: none; padding: 1rem 2rem;
  font-size: 1.1rem; font-weight: 700; border-radius: 50px; cursor: pointer;
  width: 100%; transition: background-color 0.3s, transform 0.1s; display: none;
}
.vote-btn:hover { background-color: #004494; }
.vote-btn:active { transform: scale(0.98); }
.vote-btn:disabled { background-color: #cccccc; cursor: not-allowed; }
.loader {
  border: 4px solid #f3f3f3; border-top: 4px solid var(--primary-color);
  border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 0 auto 1rem auto;
}
@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
#check-process { font-size: 0.85rem; color: #888; margin-top: 1rem; text-align: left; background: #f9f9f9; padding: 10px; border-radius: 5px; }
.check-item { margin-bottom: 4px; }
.check-item.ok { color: var(--success-color); }
.check-item.error { color: var(--error-color); }
</style>
</head>
<body>
<div class="container">
  <h1 id="main-title">大会投票システム</h1>
  <div id="category-display">部門を判定中...</div>
  <div id="loader" class="loader"></div>
  <div id="status-msg" class="status-message">環境を確認しています...</div>
  <div id="booth-display" class="booth-name"></div>
  <button id="vote-btn" class="vote-btn">このブースに投票する</button>
  <div id="check-process">
    <div id="chk-env" class="check-item">端末認証: 待機中...</div>
    <div id="chk-dup" class="check-item">投票権確認: 待機中...</div>
  </div>
</div>

<script>
// ==========================================
// 設定・定数
// ==========================================
// ※ここをご自身のURLに書き換えてください
const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyj16P8-oOPwwf076T-q5CtKovmQiQ6JkAkO2rfkSQUt7jYrKmhlaoG-OOOe3wMRKVlVg/exec";
const SECURITY_SALT = "V0t3_s3cUr1ty_S@lt_2026!"; 
let currentBoothId = null;
let currentCategory = "PRS"; 
let generatedVisitorId = null;

// ==========================================
// 初期化
// ==========================================
async function initialize() {
  try {
    // URLパスから部門（GP, UQ等）を抽出
    const path = window.location.pathname;
    const categoryMatch = path.match(/QRV2026-([A-Z0-9]+)/);
    if (categoryMatch && categoryMatch[1]) {
      currentCategory = categoryMatch[1];
    }
    document.getElementById('category-display').textContent = `【${currentCategory}部門】`;

    // URLパラメータからブースIDを取得
    const urlParams = new URLSearchParams(window.location.search);
    currentBoothId = urlParams.get('booth');
    
    if (!currentBoothId) {
      throw new Error("ブース情報が見つかりません。QRコードを正しくスキャンしてください。");
    }
    document.getElementById('booth-display').textContent = `投票先: ブース No.${currentBoothId}`;

    // 1. 部門ごとの重複チェック（この部門にすでに投票したか）
    await checkLocalVoteRecord();

    // 2. 端末識別（フィンガープリント）生成
    generatedVisitorId = await generateFingerprint();

    updateUI('ready', 'お一人につき各部門1回投票可能です。');
  } catch (error) {
    updateUI('error', error.message);
  }
}

// ==========================================
// 重複チェック (部門別)
// ==========================================
async function checkLocalVoteRecord() {
  const key = `voted_status_${currentCategory}`;
  const votedLocal = localStorage.getItem(key);
  
  // Cookieでも補助的にチェック
  const votedCookie = document.cookie.split(';').some(c => c.trim().startsWith(`${key}=true`));

  if (votedLocal || votedCookie) {
    updateCheckItem('chk-dup', 'error', '投票済み');
    throw new Error(`${currentCategory}部門への投票はすでに完了しています。`);
  }
  updateCheckItem('chk-dup', 'ok', '未投票（投票可能です）');
}

async function saveLocalVoteRecord() {
  const key = `voted_status_${currentCategory}`;
  localStorage.setItem(key, 'true');
  // 1年間有効なCookieをセット
  const d = new Date();
  d.setTime(d.getTime() + (365 * 24 * 60 * 60 * 1000));
  document.cookie = `${key}=true; expires=${d.toUTCString()}; path=/; SameSite=Strict`;
}

// ==========================================
// セキュリティ・通信
// ==========================================
async function sha256(message) {
  const msgBuffer = new TextEncoder().encode(message);
  const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
  return Array.from(new Uint8Array(hashBuffer)).map(b => b.toString(16).padStart(2, '0')).join('');
}

async function generateFingerprint() {
  try {
    // 端末の特性（画面サイズ、タイムゾーン、言語、ブラウザ情報）を組み合わせてIDを作成
    const components = [
      navigator.userAgent,
      screen.width + 'x' + screen.height,
      new Date().getTimezoneOffset(),
      navigator.language,
      navigator.platform
    ].join('||');
    const fp = await sha256(components);
    updateCheckItem('chk-env', 'ok', '端末認証: 完了');
    return fp;
  } catch (e) {
    updateCheckItem('chk-env', 'error', '認証失敗');
    throw new Error("端末認証に失敗しました。シークレットモードを解除して試してください。");
  }
}

async function submitVote() {
  const voteBtn = document.getElementById('vote-btn');
  voteBtn.disabled = true;
  voteBtn.textContent = "送信中...";

  try {
    const timestamp = new Date().getTime();
    // 署名（改ざん防止）: 部門、ブース、端末ID、時間を結合
    const payloadString = `${currentCategory}:${currentBoothId}:${generatedVisitorId}:${timestamp}:${SECURITY_SALT}`;
    const signature = await sha256(payloadString);

    const postData = {
      category: currentCategory,
      boothId: currentBoothId,
      visitorId: generatedVisitorId,
      timestamp: timestamp,
      signature: signature
    };

    const response = await fetch(GAS_WEB_APP_URL, {
      method: 'POST',
      mode: 'cors',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify(postData)
    });

    if (!response.ok) throw new Error("サーバーとの通信に失敗しました。");
    
    const result = JSON.parse(await response.text());

    if (result.success) {
      await saveLocalVoteRecord();
      updateUI('success', `${currentCategory}部門への投票が完了しました！`);
    } else {
      throw new Error(result.error || "投票を受け付けられませんでした。");
    }
  } catch (error) {
    updateUI('error', error.message);
    voteBtn.disabled = false;
    voteBtn.textContent = "もう一度試す";
  }
}

function updateUI(state, message = "") {
  const loader = document.getElementById('loader');
  const statusMsg = document.getElementById('status-msg');
  const boothDisplay = document.getElementById('booth-display');
  const voteBtn = document.getElementById('vote-btn');
  statusMsg.textContent = message;
  loader.style.display = (state === 'loading') ? 'block' : 'none';
  boothDisplay.style.display = (state === 'ready') ? 'block' : (state === 'success' ? 'none' : 'block');
  voteBtn.style.display = (state === 'ready') ? 'block' : 'none';
  if (state === 'error') statusMsg.className = 'status-message error-message';
  if (state === 'success') statusMsg.className = 'status-message success-message';
}

function updateCheckItem(id, status, text) {
  const el = document.getElementById(id);
  if (el) { el.textContent = text; el.className = `check-item ${status}`; }
}

document.getElementById('vote-btn').addEventListener('click', submitVote);
window.addEventListener('DOMContentLoaded', initialize);
</script>
</body>
</html>
