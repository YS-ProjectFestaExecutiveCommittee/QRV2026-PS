<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>大会ブース 投票システム</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --primary-color: #0056b3;
  --secondary-color: #e9ecef;
  --success-color: #28a745;
  --error-color: #dc3545;
  --text-main: #333333;
  --bg-color: #f4f7f6;
}
body {
  font-family: 'Noto Sans JP', sans-serif;
  background-color: var(--bg-color);
  color: var(--text-main);
  margin: 0;
  padding: 0;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
}
.container {
  background-color: #ffffff;
  padding: 2rem;
  border-radius: 12px;
  box-shadow: 0 8px 24px rgba(0, 0, 0, 0.1);
  width: 90%;
  max-width: 400px;
  text-align: center;
}
h1 { font-size: 1.5rem; margin-bottom: 0.5rem; color: var(--primary-color); }
#category-display { font-weight: 500; color: #555; margin-bottom: 10px; }
.booth-name {
  font-size: 1.25rem; font-weight: 700; margin: 1rem 0; padding: 1rem;
  background-color: var(--secondary-color); border-radius: 8px; display: none;
}
.status-message { margin-bottom: 1.5rem; font-size: 0.95rem; color: #666; min-height: 1.5em; }
.error-message { color: var(--error-color); font-weight: 500; }
.success-message { color: var(--success-color); font-weight: 700; font-size: 1.1rem; }
.vote-btn {
  background-color: var(--primary-color); color: white; border: none; padding: 1rem 2rem;
  font-size: 1.1rem; font-weight: 700; border-radius: 50px; cursor: pointer;
  width: 100%; transition: background-color 0.3s, transform 0.1s; display: none;
}
.vote-btn:hover { background-color: #004494; }
.vote-btn:active { transform: scale(0.98); }
.vote-btn:disabled { background-color: #cccccc; cursor: not-allowed; }
.loader {
  border: 4px solid #f3f3f3; border-top: 4px solid var(--primary-color);
  border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 0 auto 1rem auto;
}
@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
#check-process { font-size: 0.85rem; color: #888; margin-top: 1rem; text-align: left; background: #f9f9f9; padding: 10px; border-radius: 5px; }
.check-item { margin-bottom: 4px; }
.check-item.ok { color: var(--success-color); }
.check-item.error { color: var(--error-color); }
</style>
</head>
<body>
<div class="container">
  <h1 id="main-title">大会投票システム</h1>
  <div id="category-display">部門の読み込み中...</div>
  <div id="loader" class="loader"></div>
  <div id="status-msg" class="status-message">環境の安全性と情報を確認しています...</div>
  <div id="booth-display" class="booth-name"></div>
  <button id="vote-btn" class="vote-btn">このブースに投票する</button>
  <div id="check-process">
    <div id="chk-env" class="check-item">端末固有認証: 待機中...</div>
    <div id="chk-dup" class="check-item">重複投票チェック: 待機中...</div>
  </div>
</div>

<script>
// ==========================================
// 設定・定数
// ==========================================
const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbygaielsC7TVAyE_vRn_gi-ckgzVgpuwOuIEqtY89tI9TqbIOEWGyYLPE6sAZI4VcEdoQ/exec"; // ここを自身のURLに書き換えてください
const SECURITY_SALT = "V0t3_s3cUr1ty_S@lt_2026!"; 
let currentBoothId = null;
let currentCategory = "PRS"; // デフォルト
let generatedVisitorId = null;

// ==========================================
// 初期化
// ==========================================
async function initialize() {
  try {
    // URLから部門(Category)を特定するロジック
    // 例: .../QRV2026-GP/ -> GP, .../QRV2026-UQ/ -> UQ
    const path = window.location.pathname;
    const match = path.match(/QRV2026-([A-Z0-9]+)/);
    if (match && match[1]) {
      currentCategory = match[1];
    }
    document.getElementById('category-display').textContent = `対象部門: ${currentCategory}`;

    const urlParams = new URLSearchParams(window.location.search);
    currentBoothId = urlParams.get('booth');
    if (!currentBoothId) {
      throw new Error("ブース情報がURLに含まれていません。正しいQRコードを読み込んでください。");
    }
    document.getElementById('booth-display').textContent = `ブース番号: ${currentBoothId}`;

    // 部門別の重複チェック
    await checkLocalVoteRecord();

    // フィンガープリント生成
    generatedVisitorId = await generateFingerprint();

    updateUI('ready', '準備完了。ボタンを押して投票してください。');
  } catch (error) {
    updateUI('error', error.message);
  }
}

// ==========================================
// 重複チェック (部門別)
// ==========================================
async function checkLocalVoteRecord() {
  const key = `voted_${currentCategory}`; // 部門ごとにキーを分ける
  const votedLocal = localStorage.getItem(key);
  
  const cookies = document.cookie.split(';');
  const votedCookie = cookies.some(c => c.trim().startsWith(`${key}=true`));

  if (votedLocal || votedCookie) {
    updateCheckItem('chk-dup', 'error', '既にこの部門への投票は完了しています');
    throw new Error(`この部門 (${currentCategory}) には既に投票済みです。`);
  }
  updateCheckItem('chk-dup', 'ok', '重複チェック: クリア');
}

async function saveLocalVoteRecord() {
  const key = `voted_${currentCategory}`;
  localStorage.setItem(key, 'true');
  const d = new Date();
  d.setTime(d.getTime() + (365 * 24 * 60 * 60 * 1000));
  document.cookie = `${key}=true; expires=${d.toUTCString()}; path=/; SameSite=Strict`;
}

// ==========================================
// セキュリティ・通信
// ==========================================
async function sha256(message) {
  const msgBuffer = new TextEncoder().encode(message);
  const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
  return Array.from(new Uint8Array(hashBuffer)).map(b => b.toString(16).padStart(2, '0')).join('');
}

async function generateFingerprint() {
  try {
    const components = [
      navigator.userAgent,
      screen.width + 'x' + screen.height,
      new Date().getTimezoneOffset(),
      navigator.language
    ].join('||');
    const fp = await sha256(components);
    updateCheckItem('chk-env', 'ok', '端末固有認証: 正常');
    return fp;
  } catch (e) {
    updateCheckItem('chk-env', 'error', '認証エラー');
    throw e;
  }
}

async function submitVote() {
  const voteBtn = document.getElementById('vote-btn');
  voteBtn.disabled = true;
  voteBtn.textContent = "投票処理中...";

  try {
    const timestamp = new Date().getTime();
    // 署名にCategoryも含めることで改ざんを防止
    const payloadString = `${currentCategory}:${currentBoothId}:${generatedVisitorId}:${timestamp}:${SECURITY_SALT}`;
    const signature = await sha256(payloadString);

    const postData = {
      category: currentCategory, // 追加
      boothId: currentBoothId,
      visitorId: generatedVisitorId,
      timestamp: timestamp,
      signature: signature
    };

    const response = await fetch(GAS_WEB_APP_URL, {
      method: 'POST',
      mode: 'cors',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify(postData)
    });

    const result = JSON.parse(await response.text());

    if (result.success) {
      await saveLocalVoteRecord();
      updateUI('success', `${currentCategory}部門への投票が完了しました！`);
    } else {
      throw new Error(result.error || "投票エラー");
    }
  } catch (error) {
    updateUI('error', `エラー: ${error.message}`);
    voteBtn.disabled = false;
    voteBtn.textContent = "再試行する";
  }
}

// UI操作ユーティリティ (既存と同様)
function updateUI(state, message = "") {
  const loader = document.getElementById('loader');
  const statusMsg = document.getElementById('status-msg');
  const boothDisplay = document.getElementById('booth-display');
  const voteBtn = document.getElementById('vote-btn');
  statusMsg.textContent = message;
  loader.style.display = (state === 'loading') ? 'block' : 'none';
  boothDisplay.style.display = (state === 'ready') ? 'block' : (state === 'success' ? 'none' : 'block');
  voteBtn.style.display = (state === 'ready') ? 'block' : 'none';
  if (state === 'error') statusMsg.className = 'status-message error-message';
  if (state === 'success') statusMsg.className = 'status-message success-message';
}

function updateCheckItem(id, status, text) {
  const el = document.getElementById(id);
  if (el) { el.textContent = text; el.className = `check-item ${status}`; }
}

document.getElementById('vote-btn').addEventListener('click', submitVote);
window.addEventListener('DOMContentLoaded', initialize);
</script>
</body>
</html>
